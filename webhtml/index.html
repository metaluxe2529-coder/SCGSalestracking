<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCG Sales Tracking</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: #003B7A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash {
      text-align: center;
      color: white;
      padding: 40px 24px;
    }
    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
    }
    .logo span { color: #F5A623; }
    .subtitle {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 40px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 14px; opacity: 0.7; }
    .error-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px;
      max-width: 320px;
      margin: 0 auto;
    }
    .error-card h3 { font-size: 18px; margin-bottom: 8px; }
    .error-card p { font-size: 14px; opacity: 0.8; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">SCG<span>.</span></div>
    <div class="subtitle">Sales Tracking</div>
    <div id="content">
      <div class="spinner"></div>
      <div class="status">กำลังเข้าสู่ระบบ...</div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const SUPABASE_URL  = 'https://vuqcoadeexyqmaoldkzt.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWNvYWRlZXh5cW1hb2xka3p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzE2NjQsImV4cCI6MjA5NjI0NzY2NH0.jLnRNjI7wq6fJ_hFUpO2OZiN39wQAsU-IhrYC8DOZsU';
    const LIFF_ID       = 'YOUR_LIFF_ID'; // Replace with your LIFF ID

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function showError(title, msg) {
      document.getElementById('content').innerHTML = `
        <div class="error-card">
          <h3>⚠️ ${title}</h3>
          <p>${msg}</p>
        </div>`;
    }

    async function init() {
      try {
        // Init LIFF
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // Get LINE profile
        const profile = await liff.getProfile();
        const { userId, displayName, pictureUrl } = profile;

        // Upsert staff record
        const { data, error } = await db.rpc('upsert_staff_from_liff', {
          p_line_user_id: userId,
          p_display_name: displayName,
          p_picture_url:  pictureUrl,
        });

        if (error || !data?.ok) {
          showError('เข้าสู่ระบบไม่สำเร็จ', error?.message || data?.reason || 'ลองใหม่อีกครั้ง');
          return;
        }

        if (!data.is_active) {
          showError('บัญชีถูกระงับ', 'กรุณาติดต่อผู้ดูแลระบบ');
          return;
        }

        // Save session to localStorage
        localStorage.setItem('scg_session', JSON.stringify({
          line_user_id: userId,
          display_name: displayName,
          picture_url:  pictureUrl,
          staff_id:     data.staff_id,
          role:         data.role,
        }));

        // Redirect by role
        if (data.role === 'manager') {
          location.replace('manager.html');
        } else {
          location.replace('sales.html');
        }

      } catch (err) {
        console.error(err);
        showError('เกิดข้อผิดพลาด', err.message || 'ไม่สามารถเชื่อมต่อ LINE ได้');
      }
    }

    init();
  </script>
</body>
</html>
