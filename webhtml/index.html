<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SCG Sales Tracking</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: #0d1420;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100dvh;
      background: #003B7A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
      position: relative;
    }
    @media (min-width: 480px) {
      .app {
        min-height: 100vh;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.7);
      }
    }
    .splash {
      width: 100%;
      text-align: center;
      color: white;
      padding: 40px 0;
    }
    .logo {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .logo span { color: #F5A623; }
    .subtitle {
      font-size: 15px;
      opacity: 0.65;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 56px;
    }
    .dev-label {
      font-size: 11px;
      background: #F5A623;
      color: #003B7A;
      font-weight: 800;
      padding: 3px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
      letter-spacing: 1.5px;
    }
    .pick-title {
      font-size: 13px;
      opacity: 0.55;
      margin-bottom: 14px;
    }
    .staff-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 14px 16px;
      color: white;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      text-align: left;
      min-height: 64px;
      transition: background 0.15s;
      -webkit-user-select: none; user-select: none;
    }
    .staff-btn:active { background: rgba(255,255,255,0.16); }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #0056B3;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 900; flex-shrink: 0;
      border: 2px solid #F5A623;
    }
    .info { flex: 1; }
    .name { font-size: 15px; font-weight: 700; }
    .role { font-size: 12px; opacity: 0.6; margin-top: 2px; }
    .arrow { opacity: 0.4; font-size: 18px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { opacity: 0.6; font-size: 14px; margin-top: 8px; }
    #loading { padding: 12px 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="splash">
    <div class="logo">SCG<span>.</span></div>
    <div class="subtitle">Sales Tracking</div>

    <div id="dev-label-el" class="dev-label" style="display:none">DEV MODE</div>
    <div id="loading"><div class="spinner"></div></div>
    <div id="status">กำลังเชื่อมต่อ LINE...</div>
    <div id="pick-title" class="pick-title" style="display:none">เลือกบัญชีสำหรับทดสอบ</div>
    <div id="staff-buttons" style="margin-top:8px"></div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://vuqcoadeexyqmaoldkzt.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWNvYWRlZXh5cW1hb2xka3p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzE2NjQsImV4cCI6MjA5NjI0NzY2NH0.jLnRNjI7wq6fJ_hFUpO2OZiN39wQAsU-IhrYC8DOZsU';
    const LIFF_ID       = '2010342819-X8uSIn0R';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const isDev = new URLSearchParams(location.search).has('dev');

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    async function loginWithLine() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        setStatus('กำลังโหลดข้อมูล...');
        const profile = await liff.getProfile();
        await resolveStaff(profile.userId, profile.displayName, profile.pictureUrl);
      } catch (e) {
        setStatus('❌ เชื่อมต่อ LINE ไม่ได้: ' + e.message);
      }
    }

    async function resolveStaff(lineUserId, displayName, pictureUrl) {
      const { data, error } = await db
        .from('staff')
        .select('id, display_name, picture_url, role, line_user_id')
        .eq('line_user_id', lineUserId)
        .eq('is_active', true)
        .single();

      if (error || !data) {
        const q = new URLSearchParams({ lid: lineUserId, name: displayName, pic: pictureUrl || '' });
        location.replace('register.html?' + q.toString());
        return;
      }

      localStorage.setItem('scg_session', JSON.stringify({
        line_user_id: data.line_user_id,
        display_name: data.display_name || displayName,
        picture_url:  data.picture_url  || pictureUrl,
        staff_id:     data.id,
        role:         data.role,
      }));
      location.replace(data.role === 'manager' ? 'manager.html' : 'sales.html');
    }

    let staffMap = {};

    async function loadDevMode() {
      document.getElementById('dev-label-el').style.display = 'inline-block';
      document.getElementById('pick-title').style.display   = 'block';
      setStatus('');

      const { data, error } = await db
        .from('staff')
        .select('id, display_name, picture_url, role, line_user_id')
        .eq('is_active', true)
        .order('role')
        .order('display_name');

      document.getElementById('loading').style.display = 'none';

      if (error || !data?.length) {
        document.getElementById('staff-buttons').innerHTML =
          '<p style="opacity:0.5;font-size:13px">ไม่พบข้อมูลพนักงาน</p>';
        return;
      }

      data.forEach(s => staffMap[s.id] = s);
      document.getElementById('staff-buttons').innerHTML = data.map(s => `
        <button class="staff-btn" onclick="loginAs(${s.id})">
          <div class="avatar">${(s.display_name || '?')[0].toUpperCase()}</div>
          <div class="info">
            <div class="name">${s.display_name}</div>
            <div class="role">${s.role === 'manager' ? '👔 Manager' : '🧑 Sales'}</div>
          </div>
          <div class="arrow">›</div>
        </button>`).join('');
    }

    function loginAs(id) {
      const s = staffMap[id];
      localStorage.setItem('scg_session', JSON.stringify({
        line_user_id: s.line_user_id,
        display_name: s.display_name,
        picture_url:  s.picture_url,
        staff_id:     s.id,
        role:         s.role,
      }));
      location.replace(s.role === 'manager' ? 'manager.html' : 'sales.html');
    }

    if (isDev) {
      loadDevMode();
    } else {
      loginWithLine();
    }
  </script>
</div>
</body>
</html>
