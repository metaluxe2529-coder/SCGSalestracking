<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SCG — Manager Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --blue: #003B7A;
      --gold: #F5A623;
      --gray: #F2F4F8;
      --text: #1A1A2E;
      --sub: #6B7280;
      --border: #E5E7EB;
    }
    body {
      font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif;
      background: #0d1420;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 390px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--gray);
      color: var(--text);
      overflow: hidden;
    }
    @media (min-width: 480px) {
      .app { box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.7); }
    }

    /* Header */
    .header {
      background: var(--blue);
      color: white;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      flex-shrink: 0;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 17px; font-weight: 700; }
    .header-date { font-size: 11px; opacity: 0.65; margin-top: 2px; }
    .header-badge {
      background: rgba(255,255,255,0.18);
      border-radius: 99px; padding: 4px 10px;
      font-size: 11px; font-weight: 600;
    }

    /* Scroll */
    .scroll-area {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .section-label {
      font-size: 11px; font-weight: 700; color: var(--sub);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 14px 16px 6px;
    }

    /* Summary bar */
    .summary-bar {
      display: flex; gap: 8px;
      padding: 12px 16px 4px;
    }
    .sum-box {
      flex: 1; background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 8px; text-align: center;
    }
    .sum-num { font-size: 22px; font-weight: 800; color: var(--blue); }
    .sum-lbl { font-size: 10px; color: var(--sub); margin-top: 1px; }

    /* Team cards */
    .team-scroll {
      display: flex; gap: 10px;
      padding: 0 16px 4px;
      overflow-x: auto; scrollbar-width: none;
    }
    .team-scroll::-webkit-scrollbar { display: none; }

    .team-card {
      flex-shrink: 0; width: 96px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 12px 8px; text-align: center;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .team-card.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,59,122,.12);
    }
    .team-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      margin: 0 auto 7px;
    }
    .av-boom    { background: #fef3c7; color: #b45309; }
    .av-bee     { background: #dbeafe; color: #1d4ed8; }
    .av-tan     { background: #dcfce7; color: #15803d; }
    .av-nueng   { background: #ede9fe; color: #6d28d9; }
    .av-na      { background: #ffedd5; color: #c2410c; }
    .av-default { background: #f1f5f9; color: #475569; }

    .team-name { font-size: 13px; font-weight: 700; }
    .team-big  { font-size: 22px; font-weight: 800; color: var(--blue); line-height: 1.1; margin-top: 5px; }
    .team-small { font-size: 10px; color: var(--sub); }

    /* Customer link */
    .goto-btn {
      display: flex; align-items: center; justify-content: space-between;
      background: white; border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 16px;
      margin: 6px 16px 0; cursor: pointer;
      text-decoration: none; color: var(--text);
    }
    .goto-btn span { font-size: 14px; font-weight: 600; }
    .goto-arrow { font-size: 20px; color: var(--sub); }

    /* Filter chips */
    .filter-row {
      display: flex; gap: 6px;
      padding: 0 16px 8px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip {
      display: inline-flex; align-items: center;
      padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); background: white; color: var(--sub);
      white-space: nowrap; cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .chip.active { border-color: var(--blue); background: var(--blue); color: white; }

    /* Feed */
    .feed-list { padding: 0 16px; display: flex; flex-direction: column; gap: 7px; }

    .feed-item {
      background: white; border-radius: 12px;
      border: 1px solid var(--border);
      padding: 11px 13px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .feed-av {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }
    .feed-shop { font-size: 13px; font-weight: 700; }
    .feed-meta { font-size: 11px; color: var(--sub); margin-top: 3px; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .dot-in  { background: #10b981; }
    .dot-out { background: #9ca3af; }

    .empty { text-align: center; padding: 40px 16px; color: var(--sub); font-size: 14px; }
    .skeleton { background: #e2e8f0; border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-row">
      <div>
        <h1>ภาพรวมทีมขาย</h1>
        <div class="header-date" id="headerDate"></div>
      </div>
      <span class="header-badge">ผู้จัดการ</span>
    </div>
  </div>

  <div class="scroll-area">

    <!-- Summary -->
    <div class="summary-bar" id="summaryBar">
      <div class="sum-box skeleton" style="height:58px"></div>
      <div class="sum-box skeleton" style="height:58px"></div>
      <div class="sum-box skeleton" style="height:58px"></div>
    </div>

    <!-- Team -->
    <div class="section-label">ทีมขาย — visit วันนี้</div>
    <div class="team-scroll" id="teamScroll">
      <div class="team-card skeleton" style="height:128px"></div>
      <div class="team-card skeleton" style="height:128px"></div>
      <div class="team-card skeleton" style="height:128px"></div>
      <div class="team-card skeleton" style="height:128px"></div>
      <div class="team-card skeleton" style="height:128px"></div>
    </div>

    <!-- Customer list link -->
    <div class="section-label">ลูกค้า</div>
    <a class="goto-btn" href="customer_list.html">
      <span>รายชื่อลูกค้าทั้งหมด</span>
      <span class="goto-arrow">›</span>
    </a>

    <!-- Activity feed -->
    <div class="section-label">กิจกรรมล่าสุด</div>
    <div class="filter-row" id="spFilter">
      <span class="chip active" data-sp="" onclick="filterFeed(this,'')">ทุกคน</span>
    </div>
    <div class="feed-list" id="feedList">
      <div class="feed-item"><div class="skeleton" style="width:32px;height:32px;border-radius:50%;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:13px;width:60%;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:85%"></div></div></div>
      <div class="feed-item"><div class="skeleton" style="width:32px;height:32px;border-radius:50%;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:13px;width:60%;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:85%"></div></div></div>
      <div class="feed-item"><div class="skeleton" style="width:32px;height:32px;border-radius:50%;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:13px;width:60%;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:85%"></div></div></div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL  = 'https://vuqcoadeexyqmaoldkzt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWNvYWRlZXh5cW1hb2xka3p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzE2NjQsImV4cCI6MjA5NjI0NzY2NH0.jLnRNjI7wq6fJ_hFUpO2OZiN39wQAsU-IhrYC8DOZsU';

const AV_CLS    = { 'บูม':'av-boom','บี้':'av-bee','แทน':'av-tan','หนึ่ง':'av-nueng','นะ':'av-na' };
const SP_ORDER  = ['บูม','บี้','แทน','หนึ่ง','นะ'];

let allStaff  = [];
let allShops  = [];
let allVisits = [];
let activeSpFilter = '';

function apiGet(path) {
  return fetch(`${SUPABASE_URL}${path}`, {
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
  }).then(r => r.json());
}

function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(iso) {
  if (!iso) return '';
  const d    = new Date(iso);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return 'วันนี้';
  const diff = Math.floor((today - d) / 86400000);
  if (diff === 1) return 'เมื่อวาน';
  return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
}

async function load() {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('th-TH', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const [staffData, shopsData, visitsData] = await Promise.all([
    apiGet('/rest/v1/staff?select=id,display_name,role&is_active=eq.true'),
    apiGet('/rest/v1/shops?select=id,name,salesperson&is_active=eq.true'),
    apiGet('/rest/v1/visits?select=id,checkin_at,checkout_at,status,staff_id,shop_id&order=checkin_at.desc&limit=100')
  ]);

  if (staffData.error) {
    document.getElementById('feedList').innerHTML = `<div class="empty">โหลดข้อมูลไม่สำเร็จ: ${staffData.message}</div>`;
    return;
  }

  allStaff  = staffData.filter(s => s.role === 'sales');
  allShops  = shopsData;
  allVisits = Array.isArray(visitsData) ? visitsData : [];

  renderSummary();
  renderTeam();
  renderSpFilter();
  renderFeed();
}

function renderSummary() {
  const todayStr    = new Date().toDateString();
  const todayVisits = allVisits.filter(v => new Date(v.checkin_at).toDateString() === todayStr);
  const checkedIn   = allVisits.filter(v => v.status === 'checked_in').length;

  document.getElementById('summaryBar').innerHTML = `
    <div class="sum-box">
      <div class="sum-num">${todayVisits.length}</div>
      <div class="sum-lbl">visit วันนี้</div>
    </div>
    <div class="sum-box">
      <div class="sum-num">${checkedIn}</div>
      <div class="sum-lbl">กำลัง check-in</div>
    </div>
    <div class="sum-box">
      <div class="sum-num">${allShops.length}</div>
      <div class="sum-lbl">ลูกค้าทั้งหมด</div>
    </div>`;
}

function renderTeam() {
  const todayStr  = new Date().toDateString();
  const staffById = {};
  allStaff.forEach(s => staffById[s.id] = s.display_name);

  const shopsBySP = {};
  allShops.forEach(sh => { shopsBySP[sh.salesperson] = (shopsBySP[sh.salesperson] || 0) + 1; });

  const visitsTodayBySP = {};
  allVisits
    .filter(v => new Date(v.checkin_at).toDateString() === todayStr)
    .forEach(v => {
      const name = staffById[v.staff_id];
      if (name) visitsTodayBySP[name] = (visitsTodayBySP[name] || 0) + 1;
    });

  const salesStaff = SP_ORDER
    .map(name => allStaff.find(s => s.display_name === name))
    .filter(Boolean);

  document.getElementById('teamScroll').innerHTML = salesStaff.map(s => `
    <div class="team-card" id="tc-${s.id}" onclick="focusSP('${s.display_name}')">
      <div class="team-avatar ${AV_CLS[s.display_name] || 'av-default'}">${s.display_name}</div>
      <div class="team-name">${s.display_name}</div>
      <div class="team-big">${visitsTodayBySP[s.display_name] || 0}</div>
      <div class="team-small">visit วันนี้</div>
      <div class="team-small" style="margin-top:4px">${shopsBySP[s.display_name] || 0} ลูกค้า</div>
    </div>`).join('');
}

function renderSpFilter() {
  const salesStaff = SP_ORDER
    .map(name => allStaff.find(s => s.display_name === name))
    .filter(Boolean);

  document.getElementById('spFilter').innerHTML =
    `<span class="chip active" data-sp="" onclick="filterFeed(this,'')">ทุกคน</span>` +
    salesStaff.map(s =>
      `<span class="chip" data-sp="${s.display_name}" onclick="filterFeed(this,'${s.display_name}')">${s.display_name}</span>`
    ).join('');
}

function filterFeed(el, val) {
  activeSpFilter = val;
  document.querySelectorAll('#spFilter .chip').forEach(c =>
    c.classList.toggle('active', c === el)
  );
  renderFeed();
}

function focusSP(name) {
  activeSpFilter = name;
  document.querySelectorAll('#spFilter .chip').forEach(c =>
    c.classList.toggle('active', c.dataset.sp === name)
  );
  document.querySelectorAll('.team-card').forEach(c => c.classList.remove('active'));
  const sp = allStaff.find(s => s.display_name === name);
  if (sp) document.getElementById(`tc-${sp.id}`)?.classList.add('active');
  renderFeed();
  document.getElementById('feedList').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderFeed() {
  const staffById = {};
  allStaff.forEach(s => staffById[s.id] = s.display_name);

  const shopById = {};
  allShops.forEach(sh => shopById[sh.id] = sh.name);

  let visits = allVisits;
  if (activeSpFilter) {
    const spId = allStaff.find(s => s.display_name === activeSpFilter)?.id;
    visits = visits.filter(v => v.staff_id === spId);
  }

  if (!visits.length) {
    document.getElementById('feedList').innerHTML = `<div class="empty">ยังไม่มีกิจกรรม</div>`;
    return;
  }

  document.getElementById('feedList').innerHTML = visits.slice(0, 50).map(v => {
    const name   = staffById[v.staff_id] || '?';
    const shop   = shopById[v.shop_id]   || `ร้าน #${v.shop_id}`;
    const isIn   = v.status === 'checked_in';
    const timeIn = fmtTime(v.checkin_at);
    const timeOut = v.checkout_at ? ' – ' + fmtTime(v.checkout_at) : '';
    const dateStr = fmtDate(v.checkin_at);
    return `
      <div class="feed-item">
        <div class="feed-av ${AV_CLS[name] || 'av-default'}">${name}</div>
        <div style="flex:1;min-width:0">
          <div class="feed-shop">${shop}</div>
          <div class="feed-meta">
            <span class="dot ${isIn ? 'dot-in' : 'dot-out'}"></span>
            ${name} · ${dateStr} ${timeIn}${timeOut}
          </div>
        </div>
      </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
