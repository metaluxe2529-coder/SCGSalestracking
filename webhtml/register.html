<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SCG — ลงทะเบียน</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: #0d1420;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100dvh;
      background: #003B7A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
    }
    @media (min-width: 480px) {
      .app {
        min-height: 100vh;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.7);
      }
    }
    .wrap {
      width: 100%;
      text-align: center;
      color: white;
    }
    .logo { font-size: 42px; font-weight: 900; letter-spacing: -2px; line-height: 1; margin-bottom: 4px; }
    .logo span { color: #F5A623; }
    .subtitle { font-size: 13px; opacity: 0.55; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }

    /* Loading state */
    #loading-state { padding: 16px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-text { font-size: 14px; opacity: 0.65; }

    /* Register card */
    .card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      text-align: left;
      color: #1A1A2E;
    }
    .card-title {
      font-size: 18px; font-weight: 800;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 13px; color: #6B7280;
      margin-bottom: 24px; line-height: 1.6;
    }
    .form-label {
      font-size: 12px; font-weight: 700;
      color: #374151; margin-bottom: 8px; display: block;
    }
    .form-input {
      width: 100%;
      border: 1.5px solid #E5E7EB;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 18px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 2px;
      color: #1A1A2E;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: #003B7A; }

    .btn-submit {
      width: 100%; margin-top: 16px;
      padding: 16px;
      border: none; border-radius: 12px;
      background: #003B7A; color: white;
      font-size: 16px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      min-height: 52px;
      transition: opacity 0.2s;
      -webkit-user-select: none; user-select: none;
    }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-submit:active:not(:disabled) { opacity: 0.85; }

    .error-msg {
      margin-top: 12px; padding: 12px 14px;
      background: #FEE2E2; border-radius: 10px;
      color: #DC2626; font-size: 13px; font-weight: 600;
      display: none; line-height: 1.5;
    }

    .hint {
      margin-top: 20px;
      font-size: 12px; color: #6B7280;
      text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="wrap">
    <div class="logo">SCG<span>.</span></div>
    <div class="subtitle">Sales Tracking</div>

    <div id="loading-state">
      <div class="spinner"></div>
      <div id="status-text">กำลังเชื่อมต่อ LINE...</div>
    </div>

    <div class="card" id="register-card" style="display:none">
      <div class="card-title">ลงทะเบียนเข้าใช้งาน</div>
      <div class="card-sub">กรอกเบอร์โทรศัพท์ที่ผู้จัดการบันทึกไว้ในระบบ เพื่อเชื่อมบัญชี LINE ของคุณ</div>
      <label class="form-label">เบอร์โทรศัพท์</label>
      <input type="tel" class="form-input" id="phone-input"
        placeholder="0812345678" maxlength="10"
        inputmode="numeric" pattern="[0-9]*" />
      <div class="error-msg" id="error-msg"></div>
      <button class="btn-submit" id="submit-btn" onclick="doLink()">ยืนยันและเข้าสู่ระบบ</button>
      <div class="hint">หากยังไม่มีบัญชีในระบบ กรุณาติดต่อผู้จัดการ</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://vuqcoadeexyqmaoldkzt.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1cWNvYWRlZXh5cW1hb2xka3p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzE2NjQsImV4cCI6MjA5NjI0NzY2NH0.jLnRNjI7wq6fJ_hFUpO2OZiN39wQAsU-IhrYC8DOZsU';
    const LIFF_ID       = '2010342819-X8uSIn0R';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const params = new URLSearchParams(location.search);
    let lineUserId   = params.get('lid')  || '';
    let displayName  = params.get('name') || '';
    let pictureUrl   = params.get('pic')  || '';

    function setStatus(msg) { document.getElementById('status-text').textContent = msg; }
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg; el.style.display = 'block';
    }
    function hideError() { document.getElementById('error-msg').style.display = 'none'; }

    async function init() {
      if (lineUserId) {
        showRegisterForm();
        return;
      }
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        setStatus('กำลังโหลดข้อมูล LINE...');
        const profile = await liff.getProfile();
        lineUserId  = profile.userId;
        displayName = profile.displayName;
        pictureUrl  = profile.pictureUrl || '';
        showRegisterForm();
      } catch (e) {
        setStatus('❌ เชื่อมต่อ LINE ไม่ได้: ' + e.message);
      }
    }

    function showRegisterForm() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('register-card').style.display = 'block';
      setTimeout(() => document.getElementById('phone-input').focus(), 100);
    }

    async function doLink() {
      hideError();
      const phone = document.getElementById('phone-input').value.trim();
      if (!phone || phone.length < 9) { showError('กรุณากรอกเบอร์โทรให้ถูกต้อง'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...';

      const { data, error } = await db.rpc('link_staff_line_account', {
        p_phone: phone,
        p_line_user_id: lineUserId,
      });

      btn.disabled = false; btn.textContent = 'ยืนยันและเข้าสู่ระบบ';

      if (error || !data?.ok) {
        showError(data?.reason || error?.message || 'เกิดข้อผิดพลาด');
        return;
      }

      localStorage.setItem('scg_session', JSON.stringify({
        line_user_id: data.line_user_id,
        display_name: data.display_name || displayName,
        picture_url:  data.picture_url  || pictureUrl,
        staff_id:     data.staff_id,
        role:         data.role,
      }));
      location.replace(data.role === 'manager' ? 'manager.html' : 'sales.html');
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('phone-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLink();
      });
    });

    init();
  </script>
</div>
</body>
</html>
